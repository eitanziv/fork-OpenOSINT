<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">

  <!-- Background -->
  <rect width="1200" height="630" fill="#0d1117"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="6" height="630" fill="#3fb950"/>

  <!-- Top-left: site label -->
  <text x="48" y="58" font-family="monospace,monospace" font-size="18" fill="#3fb950" font-weight="bold" letter-spacing="0.08em">OPENOSINT</text>
  <text x="48" y="80" font-family="monospace,monospace" font-size="14" fill="#556270">openosint.tech/free-prompts</text>

  <!-- Main headline -->
  <text x="48" y="180" font-family="monospace,monospace" font-size="58" fill="#e6edf3" font-weight="bold">5 Free AI OSINT</text>
  <text x="48" y="250" font-family="monospace,monospace" font-size="58" fill="#3fb950" font-weight="bold">Prompts</text>

  <!-- Subheadline -->
  <text x="48" y="312" font-family="monospace,monospace" font-size="24" fill="#8b949e">Make ChatGPT &amp; Claude collect real data &#x2014; not hallucinate it.</text>

  <!-- Separator line -->
  <line x1="48" y1="345" x2="720" y2="345" stroke="#1f2a44" stroke-width="1"/>

  <!-- Three bullet points -->
  <text x="48" y="385" font-family="monospace,monospace" font-size="20" fill="#3fb950">&#x2713;</text>
  <text x="80" y="385" font-family="monospace,monospace" font-size="20" fill="#c9d1d9">5 tested prompts &#x2014; scope, collect, pivot, verify, document</text>

  <text x="48" y="418" font-family="monospace,monospace" font-size="20" fill="#3fb950">&#x2713;</text>
  <text x="80" y="418" font-family="monospace,monospace" font-size="20" fill="#c9d1d9">Works with Claude, GPT, or any AI assistant</text>

  <text x="48" y="451" font-family="monospace,monospace" font-size="20" fill="#3fb950">&#x2713;</text>
  <text x="80" y="451" font-family="monospace,monospace" font-size="20" fill="#c9d1d9">Free PDF &#x2014; instant download, no card needed</text>

  <!-- CTA button -->
  <rect x="48" y="496" width="320" height="56" rx="4" fill="#3fb950"/>
  <text x="208" y="530" font-family="monospace,monospace" font-size="22" fill="#000000" font-weight="bold" text-anchor="middle">Get the free prompts &#x2192;</text>

  <!-- Right side: terminal code preview -->
  <rect x="760" y="120" width="388" height="370" rx="8" fill="#0b1220" stroke="#1f2a44" stroke-width="1"/>

  <!-- Terminal title bar dots -->
  <rect x="760" y="120" width="388" height="36" rx="8" fill="#161b22"/>
  <rect x="760" y="144" width="388" height="12" fill="#161b22"/>
  <circle cx="790" cy="138" r="6" fill="#ff5f56"/>
  <circle cx="812" cy="138" r="6" fill="#ffbd2e"/>
  <circle cx="834" cy="138" r="6" fill="#27c93f"/>
  <text x="954" y="143" font-family="monospace,monospace" font-size="12" fill="#556270" text-anchor="middle">Prompt #1 &#x2014; Scope</text>

  <!-- Code lines -->
  <text x="780" y="184" font-family="monospace,monospace" font-size="12" fill="#8b949e">You are a structured OSINT analyst.</text>
  <text x="780" y="202" font-family="monospace,monospace" font-size="12" fill="#8b949e">Before any tool runs, produce a</text>
  <text x="780" y="220" font-family="monospace,monospace" font-size="12" fill="#8b949e">scope document.</text>

  <text x="780" y="248" font-family="monospace,monospace" font-size="12" fill="#58a6ff">Target:</text>
  <text x="836" y="248" font-family="monospace,monospace" font-size="12" fill="#3fb950">{{TARGET}}</text>

  <text x="780" y="276" font-family="monospace,monospace" font-size="12" fill="#e6edf3">## Target profile</text>
  <text x="780" y="294" font-family="monospace,monospace" font-size="12" fill="#8b949e">- Type: [email / username / IP /</text>
  <text x="780" y="312" font-family="monospace,monospace" font-size="12" fill="#8b949e">         domain / phone]</text>
  <text x="780" y="330" font-family="monospace,monospace" font-size="12" fill="#8b949e">- Goal: [what question are we</text>
  <text x="780" y="348" font-family="monospace,monospace" font-size="12" fill="#8b949e">         actually answering?]</text>

  <text x="780" y="376" font-family="monospace,monospace" font-size="12" fill="#e6edf3">## Tool plan</text>
  <text x="780" y="394" font-family="monospace,monospace" font-size="12" fill="#8b949e">1. search_email  &#x2014; confirm accounts</text>
  <text x="780" y="412" font-family="monospace,monospace" font-size="12" fill="#8b949e">2. search_breach &#x2014; check exposure</text>
  <text x="780" y="430" font-family="monospace,monospace" font-size="12" fill="#8b949e">3. generate_dorks &#x2014; surface web hits</text>

  <text x="780" y="458" font-family="monospace,monospace" font-size="12" fill="#e6edf3">## Ethics check</text>
  <text x="780" y="476" font-family="monospace,monospace" font-size="12" fill="#3fb950">"No concerns identified."</text>
</svg>
